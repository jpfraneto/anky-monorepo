{% extends "base.html" %}
{% block title %}anky — generations{% endblock %}
{% block content %}
<style>
  .gen-list-page { max-width: 700px; margin: 0 auto; padding: 2rem 1rem; }
  .gen-list-page h1 { margin-bottom: 0.5rem; }
  .gen-list-page p { color: #666; margin-bottom: 2rem; font-size: 0.9rem; }
  .batch-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.9rem 1rem; background: #111; border: 1px solid #222;
    border-radius: 8px; margin-bottom: 0.5rem;
    text-decoration: none; color: #eee; transition: background 0.1s;
  }
  .batch-row:hover { background: #191919; }
  .batch-id { font-family: monospace; font-size: 0.9rem; }
  .batch-meta { font-size: 0.8rem; color: #555; }
</style>

<div class="gen-list-page">
  <h1>prompt batches</h1>
  <p>each batch is a set of prompts generated by grok for anky training images.</p>
  {{ rows | safe }}
</div>
{% endblock %}
