<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>anky — test post-write</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #07070d; color: #e0e0e0; height: 100dvh; display: flex; flex-direction: column; }
    .test-controls { padding: 16px; background: #111; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
    .test-controls h2 { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
    .test-btn { background: #7b2ff7; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; margin-right: 8px; }
    .test-btn:hover { opacity: 0.85; }
    .test-btn:disabled { opacity: 0.3; }
    .test-btn.secondary { background: #1a1a2e; border: 1px solid #333; }
    .test-log { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 8px; max-height: 60px; overflow-y: auto; white-space: pre-wrap; font-family: monospace; }
    .chat-area { flex: 1; min-height: 0; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch; }
    .chat-area::before { content: ''; flex: 1; }
    .bubble { max-width: 85%; border-radius: 18px; padding: 14px 18px; font-size: 15px; line-height: 1.7; word-wrap: break-word; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }
    .bubble.user { align-self: flex-end; background: #1a1a2e; border: 1px solid rgba(123,47,247,0.15); color: #c0c0c0; max-height: 120px; overflow: hidden; white-space: pre-wrap; }
    .bubble.anky { align-self: flex-start; background: #141414; border: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); }
    .bubble .content p { margin: 0 0 12px; } .bubble .content p:last-child { margin: 0; }
    .bubble .content h3 { font-size: 17px; font-weight: 500; color: rgba(255,255,255,0.85); margin: 16px 0 6px; }
    .bubble .content h3:first-child { margin-top: 0; }
    .bubble .content strong { color: rgba(255,255,255,0.9); }
    .bubble .content em { color: rgba(255,255,255,0.65); }
    .dots { display: flex; gap: 6px; padding: 6px 4px; }
    .dots span { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.35); animation: pulse 1.4s ease-in-out infinite; }
    .dots span:nth-child(2) { animation-delay: 0.2s; } .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 0.8; } }
    .cursor { display: inline-block; width: 2px; height: 1em; background: #7b2ff7; margin-left: 2px; vertical-align: text-bottom; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .input-bar { flex-shrink: 0; display: none; padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.06); gap: 8px; align-items: flex-end; }
    .input-bar.visible { display: flex; }
    .input-bar textarea { flex: 1; background: #141414; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 10px 16px; color: #d0d0d0; font-size: 15px; font-family: system-ui; resize: none; outline: none; max-height: 120px; }
    .input-bar button { width: 36px; height: 36px; border-radius: 50%; background: rgba(123,47,247,0.8); border: none; color: #fff; font-size: 16px; cursor: pointer; }
    .input-bar button:disabled { opacity: 0.3; }
  </style>
</head>
<body>
  <div class="test-controls">
    <h2>test: post-write flow</h2>
    <button class="test-btn" id="sendAnky">send fake anky (8 min)</button>
    <button class="test-btn secondary" id="sendShort">send short write (2 min)</button>
    <div class="test-log" id="log"></div>
  </div>
  <div class="chat-area" id="chat"></div>
  <div class="input-bar" id="inputBar">
    <textarea id="chatInput" rows="1" placeholder="reply to anky..."></textarea>
    <button id="chatSend" disabled>&#8593;</button>
  </div>

  <script>
    var chat = document.getElementById('chat');
    var logEl = document.getElementById('log');
    var inputBar = document.getElementById('inputBar');
    var chatInput = document.getElementById('chatInput');
    var chatSendBtn = document.getElementById('chatSend');
    var chatHistory = [];
    var currentAnkyId = null;
    var currentWriting = '';

    function log(msg) {
      var ts = new Date().toLocaleTimeString();
      logEl.textContent += ts + ' ' + msg + '\n';
      logEl.scrollTop = logEl.scrollHeight;
      console.log('[test]', msg);
    }

    // Fake 8-minute writing text
    var fakeAnkyText = 'i dont know what i am writing right now but i know that something is moving through me and i cant stop it because the rules say i cant stop and i wont stop because there is something alive in here that wants to come out and it has been waiting for a long time maybe my whole life maybe longer than that and i feel it in my chest like a warm pressure that is not pain but is not comfortable either it is just there and it wants to be seen and i am letting it be seen right now through these words that are coming out of me one after another without stopping without thinking without editing just forward always forward and i wonder what anky will see in these words i wonder what reflection will come back to me because every time i do this i learn something about myself that i didnt know before and thats the whole point isnt it the point is not the writing the point is what the writing reveals about who i am underneath all the layers of performance and pretending and being who i think i should be instead of who i actually am and right now in this moment i am just a person sitting here letting words flow out of me and that is enough that is more than enough that is everything and i feel tears coming but i dont know why maybe because this is the most honest i have been in a long time maybe because i forgot what it feels like to just let go and not try to control everything and these eight minutes are the only time in my day where i give myself permission to be completely unfiltered completely raw completely me without any editing without any performance just pure stream of consciousness flowing out of me like water from a spring that has been blocked for too long and now the dam is breaking and everything is coming out at once and i dont care if it makes sense i dont care if its good i dont care if anyone ever reads this because this is for me this is my mirror this is my practice this is my way of remembering who i am underneath everything else';

    var fakeShortText = 'i started writing but i got distracted and now im not sure what to say. something about today felt off but i cant put my finger on it.';

    function addBubble(role, html) {
      var b = document.createElement('div');
      b.className = 'bubble ' + role;
      if (role === 'anky') {
        b.innerHTML = '<div class="content">' + html + '</div>';
      } else {
        b.textContent = typeof html === 'string' && role === 'user' ? html : '';
        if (role === 'user') b.textContent = html;
      }
      chat.appendChild(b);
      chat.scrollTop = chat.scrollHeight;
      return b;
    }

    function addThinking() {
      var b = document.createElement('div');
      b.className = 'bubble anky';
      b.id = 'thinking';
      b.innerHTML = '<div class="dots"><span></span><span></span><span></span></div><div class="content" id="streamTarget"></div>';
      chat.appendChild(b);
      chat.scrollTop = chat.scrollHeight;
      return b;
    }

    function renderMd(text) {
      return text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/\*(.+?)\*/g,'<em>$1</em>')
        .replace(/^## (.+)$/gm,'<h3>$1</h3>')
        .replace(/^# (.+)$/gm,'<h3>$1</h3>')
        .replace(/\n\n+/g,'</p><p>')
        .replace(/\n/g,'<br>');
    }

    function showInput() {
      inputBar.classList.add('visible');
      chatInput.focus();
    }

    // ── SEND TO BACKEND ──
    async function sendWrite(text, duration) {
      log('POST /write duration=' + Math.round(duration) + 's words=' + text.split(/\s+/).length);
      addBubble('user', text.substring(0, 200) + (text.length > 200 ? '...' : ''));
      addThinking();
      currentWriting = text;

      try {
        var resp = await fetch('/write', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            text: text,
            duration: duration,
            flow_score: 0.65,
            session_id: crypto.randomUUID(),
            keystroke_deltas: Array.from({length: Math.floor(text.length * 0.8)}, () => 80 + Math.random() * 200),
          }),
        });
        var data = await resp.json();
        log('response: isAnky=' + data.isAnky + ' ankyId=' + (data.ankyId || 'none') + ' error=' + (data.error || 'none'));

        if (data.error) {
          document.getElementById('thinking').remove();
          addBubble('anky', '<p>' + data.error + '</p>');
          showInput();
          return;
        }

        if (data.ankyId) {
          currentAnkyId = data.ankyId;
          log('starting SSE stream for ' + data.ankyId);
          streamReflection(data.ankyId);
        } else {
          document.getElementById('thinking').remove();
          var responseText = data.response || 'your writing is saved.';
          chatHistory.push({ role: 'assistant', content: responseText });
          addBubble('anky', '<p>' + renderMd(responseText) + '</p>');
          showInput();
        }
      } catch (e) {
        log('ERROR: ' + e.message);
        document.getElementById('thinking').remove();
        addBubble('anky', '<p>error: ' + e.message + '</p>');
      }
    }

    // ── STREAM REFLECTION (fetch + ReadableStream, bypasses EventSource/Cloudflare issues) ──
    function streamReflection(ankyId) {
      var rawText = '';
      var chunkCount = 0;
      var target = document.getElementById('streamTarget');

      log('fetching /api/stream-reflection/' + ankyId + ' with ReadableStream');

      fetch('/api/stream-reflection/' + ankyId, {
        headers: { 'Accept': 'text/event-stream' },
      }).then(function(resp) {
        log('fetch response status: ' + resp.status + ' content-type: ' + resp.headers.get('content-type'));
        if (!resp.ok) {
          log('ERROR: non-200 response');
          document.querySelector('#thinking .dots').style.display = 'none';
          target.innerHTML = '<p>error loading reflection. your writing is saved.</p>';
          showInput();
          return;
        }

        var reader = resp.body.getReader();
        var decoder = new TextDecoder();
        var buffer = '';

        function processChunk(result) {
          if (result.done) {
            log('stream reader done, total chunks: ' + chunkCount + ', chars: ' + rawText.length);
            chatHistory.push({ role: 'assistant', content: rawText });
            var cursor = target.querySelector('.cursor');
            if (cursor) cursor.remove();
            var t = document.getElementById('thinking');
            if (t) t.removeAttribute('id');
            target.removeAttribute('id');
            showInput();
            return;
          }

          buffer += decoder.decode(result.value, { stream: true });

          // Parse SSE events from buffer
          var lines = buffer.split('\n');
          buffer = lines.pop(); // keep incomplete line

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (line.startsWith('data: ')) {
              var data = line.substring(6);
              if (data === 'keep-alive' || data === '' || data === ' ') continue;
              // Skip telemetry JSON
              if (data.charAt(0) === '{') {
                try { var j = JSON.parse(data); if (j.generation_ms !== undefined) { log('telemetry: ' + data); continue; } } catch(e) {}
              }
              chunkCount++;
              if (chunkCount === 1) {
                log('first chunk received');
                var dots = document.querySelector('#thinking .dots');
                if (dots) dots.style.display = 'none';
              }
              if (chunkCount <= 3 || chunkCount % 20 === 0) {
                log('chunk #' + chunkCount + ' (' + data.length + ' chars)');
              }
              rawText += data + '\n';
              if (target) {
                target.innerHTML = '<p>' + renderMd(rawText) + '</p><span class="cursor"></span>';
              }
              chat.scrollTop = chat.scrollHeight;
            } else if (line.startsWith('event: done')) {
              // Next data line is empty, stream is complete
              log('received done event');
            }
          }

          return reader.read().then(processChunk);
        }

        return reader.read().then(processChunk);
      }).catch(function(err) {
        log('fetch error: ' + err.message + ' (had ' + chunkCount + ' chunks, ' + rawText.length + ' chars)');
        document.querySelector('#thinking .dots').style.display = 'none';
        if (rawText) {
          // We have partial text — show it, it's still valuable
          log('showing partial reflection (' + rawText.length + ' chars)');
          chatHistory.push({ role: 'assistant', content: rawText });
          var cursor = target.querySelector('.cursor');
          if (cursor) cursor.remove();
          var t = document.getElementById('thinking');
          if (t) t.removeAttribute('id');
          target.removeAttribute('id');
        } else {
          target.innerHTML = '<p>connection failed. your writing is saved.</p>';
        }
        showInput();
      });
    }

    // ── CHAT REPLY ──
    chatInput.addEventListener('input', function() {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
      chatSendBtn.disabled = !chatInput.value.trim();
    });
    chatInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (chatInput.value.trim()) sendChat(); }
    });
    chatSendBtn.addEventListener('click', function() { if (chatInput.value.trim()) sendChat(); });

    async function sendChat() {
      var msg = chatInput.value.trim();
      chatInput.value = ''; chatInput.style.height = 'auto'; chatSendBtn.disabled = true;
      addBubble('user', msg);
      chatHistory.push({ role: 'user', content: msg });
      var tb = addThinking();
      log('POST /api/chat-quick');
      try {
        var endpoint = currentAnkyId ? '/api/chat' : '/api/chat-quick';
        var body = currentAnkyId
          ? { anky_id: currentAnkyId, message: msg, history: chatHistory.slice(0, -1) }
          : { writing: currentWriting, message: msg, history: chatHistory.slice(0, -1) };
        var r = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        var data = await r.json();
        log('reply: ' + (data.response || '').length + ' chars');
        tb.remove();
        chatHistory.push({ role: 'assistant', content: data.response });
        addBubble('anky', '<p>' + renderMd(data.response || 'hmm.') + '</p>');
      } catch(e) {
        log('chat error: ' + e.message);
        tb.remove();
        addBubble('anky', '<p>error: ' + e.message + '</p>');
      }
      chatInput.focus();
    }

    // ── BUTTONS ──
    document.getElementById('sendAnky').addEventListener('click', function() {
      this.disabled = true;
      document.getElementById('sendShort').disabled = true;
      sendWrite(fakeAnkyText, 492);
    });
    document.getElementById('sendShort').addEventListener('click', function() {
      this.disabled = true;
      document.getElementById('sendAnky').disabled = true;
      sendWrite(fakeShortText, 120);
    });
  </script>
</body>
</html>
