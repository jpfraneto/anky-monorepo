<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>anky easter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; color: #eee; font-family: system-ui, sans-serif; padding: 20px; }
        h1 { text-align: center; margin-bottom: 24px; font-size: 1.5rem; font-weight: 300; letter-spacing: 0.1em; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: #1a1a1a;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card:hover { transform: scale(1.02); }
        .card img {
            width: 100%;
            display: block;
        }
        .card .label {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.6);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
        }
        .card a.dl {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            text-decoration: none;
        }
        .card a.dl:hover { background: rgba(80,80,80,0.9); }
        .count { text-align: center; margin-bottom: 16px; color: #666; font-size: 0.9rem; }
        .empty { text-align: center; margin-top: 60px; color: #555; }
    </style>
</head>
<body>
    <h1>anky easter</h1>
    <p class="count">{{ images | length }} images</p>
    {% if images | length == 0 %}
    <p class="empty">no images yet. run scripts/easter_gen.py to generate them.</p>
    {% else %}
    <div class="grid">
        {% for img in images %}
        <div class="card">
            <span class="label">{{ loop.index }}</span>
            <img src="/static/easter/{{ img }}" alt="anky easter {{ loop.index }}" loading="lazy">
            <a class="dl" href="/static/easter/{{ img }}" download>save</a>
        </div>
        {% endfor %}
    </div>
    {% endif %}
</body>
</html>
