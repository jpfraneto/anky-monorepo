{% extends "base.html" %}
{% block title %}generations — {{ batch_id }}{% endblock %}
{% block content %}
<style>
  .gen-page { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
  .gen-header { margin-bottom: 1.5rem; }
  .gen-header h1 { font-size: 1.4rem; margin: 0 0 0.25rem; }
  .gen-header .batch-id { font-size: 0.8rem; color: #555; font-family: monospace; }
  .gen-stats {
    display: flex; gap: 1.5rem; margin-bottom: 1.5rem;
    font-size: 0.85rem; color: #888;
    padding: 0.75rem 1rem; background: #111; border-radius: 8px;
  }
  .gen-stats b { color: #fff; font-size: 1.1rem; display: block; }
  .gen-stats .s-keep b { color: #4caf50; }
  .gen-stats .s-skip b { color: #f44336; }
  .gen-stats .s-total b { color: #aaa; }
  .gen-controls {
    display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center;
  }
  .gen-controls button {
    padding: 0.4rem 0.9rem; border-radius: 6px; border: 1px solid #333;
    background: #1a1a1a; color: #ccc; cursor: pointer; font-size: 0.85rem;
  }
  .gen-controls button:hover { background: #252525; }
  .gen-controls .btn-primary { background: #2a4a2a; border-color: #4caf50; color: #4caf50; }
  .gen-controls .btn-primary:hover { background: #2f5c2f; }
  .gen-search {
    flex: 1; min-width: 200px;
    padding: 0.4rem 0.75rem; border-radius: 6px; border: 1px solid #333;
    background: #1a1a1a; color: #eee; font-size: 0.85rem;
  }
  .prompt-grid {
    display: grid; gap: 0.75rem;
  }
  .prompt-card {
    background: #111; border: 1px solid #222; border-radius: 8px;
    padding: 0.9rem 1rem; display: flex; gap: 0.75rem; align-items: flex-start;
    transition: border-color 0.15s, background 0.15s;
  }
  .prompt-card.keep  { border-color: #2a5c2a; background: #0d1f0d; }
  .prompt-card.skip  { border-color: #3a1a1a; background: #1a0d0d; opacity: 0.5; }
  .prompt-card:not(.keep):not(.skip) { cursor: default; }
  .prompt-num {
    font-size: 0.75rem; color: #444; min-width: 2rem;
    margin-top: 0.2rem; font-family: monospace;
  }
  .prompt-text {
    flex: 1; font-size: 0.88rem; color: #ccc; line-height: 1.55;
  }
  .prompt-actions { display: flex; flex-direction: column; gap: 0.4rem; }
  .btn-keep, .btn-skip {
    width: 2rem; height: 2rem; border-radius: 50%; border: 1px solid;
    background: transparent; cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .btn-keep { border-color: #4caf50; color: #4caf50; }
  .btn-keep:hover, .prompt-card.keep .btn-keep { background: rgba(76,175,80,0.2); }
  .btn-skip { border-color: #f44336; color: #f44336; }
  .btn-skip:hover, .prompt-card.skip .btn-skip { background: rgba(244,67,54,0.2); }
  .gen-saved-toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: #1a3a1a; color: #4caf50; border: 1px solid #4caf50;
    padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.85rem;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .gen-saved-toast.show { opacity: 1; }
  .hidden { display: none !important; }
</style>

<div class="gen-page">
  <div class="gen-header">
    <h1>prompt review</h1>
    <div class="batch-id">{{ batch_id }}</div>
  </div>

  <div class="gen-stats">
    <div class="s-total"><b id="stat-total">{{ total }}</b> total</div>
    <div class="s-keep"><b id="stat-keep">{{ kept }}</b> keep</div>
    <div class="s-skip"><b id="stat-skip">{{ skipped }}</b> skip</div>
    <div style="flex:1"></div>
    <div style="font-size:0.8rem;color:#555">unreviewed = keep by default</div>
  </div>

  <div class="gen-controls">
    <input class="gen-search" id="search" type="text" placeholder="search prompts...">
    <button onclick="markAll('keep')">keep all</button>
    <button onclick="markAll('skip')">skip all</button>
    <button onclick="markAll(null)">clear all</button>
    <button class="btn-primary" onclick="saveStatus()">save &amp; proceed to generate</button>
  </div>

  <div class="prompt-grid" id="prompt-grid"></div>
</div>

<div class="gen-saved-toast" id="saved-toast">saved</div>

{% endblock %}
{% block scripts %}
<script>
(function() {
  const BATCH_ID = {{ batch_id | json_encode() | safe }};
  const prompts = {{ prompts_json | safe }};
  let status = {{ status_json | safe }};

  function getState(i) { return status[i] || null; }

  function setState(i, val) {
    if (val === null) { delete status[i]; }
    else { status[i] = val; }
    updateStats();
    renderCards();
    autosave();
  }

  function updateStats() {
    const keep = Object.values(status).filter(v => v === 'keep').length;
    const skip = Object.values(status).filter(v => v === 'skip').length;
    document.getElementById('stat-keep').textContent = keep;
    document.getElementById('stat-skip').textContent = skip;
  }

  function renderCards() {
    const q = document.getElementById('search').value.toLowerCase();
    const grid = document.getElementById('prompt-grid');
    grid.innerHTML = '';
    prompts.forEach(function(p, i) {
      if (q && !p.toLowerCase().includes(q)) return;
      const st = getState(i);
      const card = document.createElement('div');
      card.className = 'prompt-card' + (st ? ' ' + st : '');
      card.innerHTML = `
        <div class="prompt-num">#${i + 1}</div>
        <div class="prompt-text">${p}</div>
        <div class="prompt-actions">
          <button class="btn-keep" title="keep" onclick="toggle(${i}, 'keep')">✓</button>
          <button class="btn-skip" title="skip" onclick="toggle(${i}, 'skip')">✕</button>
        </div>`;
      grid.appendChild(card);
    });
  }

  window.toggle = function(i, val) {
    const current = getState(i);
    setState(i, current === val ? null : val);
  };

  window.markAll = function(val) {
    prompts.forEach(function(_, i) {
      if (val === null) { delete status[i]; }
      else { status[i] = val; }
    });
    updateStats();
    renderCards();
    autosave();
  };

  let saveTimer;
  function autosave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveStatus, 1200);
  }

  window.saveStatus = function() {
    fetch('/generations/' + BATCH_ID + '/status', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(status)
    }).then(function() {
      const toast = document.getElementById('saved-toast');
      toast.textContent = 'saved ✓';
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 1800);
    });
  };

  document.getElementById('search').addEventListener('input', renderCards);

  updateStats();
  renderCards();
})();
</script>
{% endblock %}
