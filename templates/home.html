{% extends "base.html" %}

{% block title %}anky — write{% endblock %}

{% block head %}
<meta property="og:title" content="anky — {{ inquiry_question }}">
<meta property="og:description" content="8 minutes. no stopping. no performing.">
<meta property="og:image" content="https://anky.app/api/og/write?prompt={{ inquiry_question | urlencode }}">
<meta property="og:type" content="website">
<meta property="og:url" content="https://anky.app/write">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="anky — {{ inquiry_question }}">
<meta name="twitter:description" content="8 minutes. no stopping. no performing.">
<meta name="twitter:image" content="https://anky.app/api/og/write?prompt={{ inquiry_question | urlencode }}">
<style>
  .navbar, .drawer, .drawer-overlay, .bottom-live-bar,
  .mobile-bottom-nav { display: none !important; }
  html, body { margin: 0; padding: 0; background: #0a0a0a; height: 100%; overflow: hidden; }

  .writing-surface {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
    font-family: system-ui, -apple-system, sans-serif;
    color: #e0e0e0;
    background: #0a0a0a;
    overflow: hidden;
  }
  .writing-surface.scrollable {
    height: auto;
    min-height: 100dvh;
    overflow: visible;
  }
  body.scrollable { overflow: auto; height: auto; }

  /* ── TOP: idle bar ── */
  .idle-bar-wrap {
    flex-shrink: 0;
    height: 3px;
    width: 100%;
    background: transparent;
  }
  .idle-bar-fill {
    height: 100%;
    width: 0%;
    background: #ff4444;
    transition: width 0.1s linear;
    opacity: 0;
  }
  .idle-bar-fill.warning { opacity: 1; }

  /* ── PROMPT ── */
  .writing-prompt {
    padding: 16px 16px 0 16px;
    font-size: 17px;
    line-height: 1.6;
    color: rgba(255,255,255,0.35);
    font-style: italic;
    flex-shrink: 0;
    transition: opacity 0.6s;
  }
  .writing-prompt.faded { opacity: 0.15; }

  /* ── TEXTAREA ── */
  .writing-textarea {
    flex: 1;
    min-height: 0;
    margin: 12px 16px 0 16px;
    padding: 0;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-size: 16px;
    line-height: 1.7;
    color: #d0d0d0;
    font-family: system-ui, -apple-system, sans-serif;
    word-wrap: break-word;
    overflow-wrap: break-word;
    caret-color: #7b2ff7;
    overflow-y: auto;
  }
  .writing-textarea::placeholder { color: rgba(255,255,255,0.15); }
  .writing-textarea::-webkit-scrollbar { width: 0; }

  /* ── BOTTOM BAR: timer + chakra + send ── */
  .writing-bottom {
    flex-shrink: 0;
    padding: 8px 16px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .chakra-bar {
    height: 3px;
    width: 100%;
    background: #1a1a1a;
    border-radius: 2px;
    overflow: hidden;
  }
  .chakra-fill {
    height: 100%;
    width: 0%;
    transition: width 0.1s linear;
  }
  .bottom-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    min-height: 36px;
  }
  .writing-timer {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 18px;
    color: #666;
    font-variant-numeric: tabular-nums;
  }
  .writing-timer.past-zero { color: #c4a0ff; }
  .send-btn {
    display: none;
    background: #fff;
    color: #0a0a0a;
    border: none;
    border-radius: 8px;
    padding: 8px 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .send-btn:hover { background: #e0e0e0; }
  .send-btn.visible { display: block; }

  /* ── AFTER SESSION: chat conversation ── */
  .session-result {
    display: none;
    padding: 16px 16px 40px 16px;
    flex-direction: column;
    gap: 16px;
  }
  .session-result.visible { display: flex; }

  /* ── Chat bubbles ── */
  .chat-bubble {
    max-width: 85%;
    border-radius: 18px;
    padding: 14px 18px;
    font-size: 15px;
    line-height: 1.7;
    word-wrap: break-word;
    overflow-wrap: break-word;
    animation: bubbleIn 0.3s ease-out;
  }
  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* User bubble: right-aligned */
  .chat-bubble.user {
    align-self: flex-end;
    background: #1a1a2e;
    border: 1px solid rgba(123, 47, 247, 0.15);
    border-bottom-right-radius: 4px;
    color: #c0c0c0;
    max-height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
  }
  .chat-bubble.user::-webkit-scrollbar { width: 3px; }
  .chat-bubble.user::-webkit-scrollbar-thumb { background: rgba(123, 47, 247, 0.3); border-radius: 2px; }

  /* Anky bubble: left-aligned */
  .chat-bubble.anky {
    align-self: flex-start;
    background: #141414;
    border: 1px solid rgba(255,255,255,0.06);
    border-bottom-left-radius: 4px;
    color: rgba(255,255,255,0.8);
  }

  .chat-label {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    margin-bottom: 4px;
    text-transform: lowercase;
    letter-spacing: 0.5px;
  }
  .chat-label.right { text-align: right; }

  /* ── Thinking dots ── */
  .thinking-dots {
    display: flex;
    gap: 5px;
    padding: 4px 0;
    align-items: center;
  }
  .thinking-dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(123, 47, 247, 0.6);
    animation: dotPulse 1.4s ease-in-out infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
  .thinking-label {
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    margin-left: 8px;
  }

  /* ── Reply content (inside anky bubble) ── */
  .result-reply {
    font-size: 15px;
    line-height: 1.8;
    color: rgba(255,255,255,0.75);
  }
  .result-reply p { margin: 0 0 12px 0; }
  .result-reply h3 { font-size: 17px; font-weight: 500; color: rgba(255,255,255,0.85); margin: 20px 0 8px 0; }
  .result-reply h4 { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.8); margin: 16px 0 6px 0; }
  .result-reply strong { color: rgba(255,255,255,0.9); }
  .result-reply em { color: rgba(255,255,255,0.65); font-style: italic; }
  .result-reply blockquote { border-left: 2px solid rgba(255,255,255,0.1); margin: 12px 0; padding: 4px 12px; color: rgba(255,255,255,0.5); }
  .result-reply ul { padding-left: 20px; margin: 8px 0; }
  .result-reply li { margin-bottom: 4px; }
  .result-reply hr { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 16px 0; }

  .stream-cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: #7b2ff7;
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .result-actions {
    margin-top: 8px;
    display: flex;
    gap: 12px;
    align-self: flex-start;
  }
  .result-actions a, .result-actions button {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.4);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
  }
  .result-actions a:hover, .result-actions button:hover {
    border-color: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.6);
  }
</style>
{% endblock %}

{% block content %}
<div class="writing-surface" id="writingSurface">
  <!-- TOP: idle countdown bar -->
  <div class="idle-bar-wrap"><div class="idle-bar-fill" id="idleBarFill"></div></div>

  <div class="writing-prompt" id="writingPrompt">{{ inquiry_question }}</div>
  <textarea class="writing-textarea" id="writingArea" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="start writing..."></textarea>

  <!-- BOTTOM: chakra bar + timer + send button -->
  <div class="writing-bottom" id="writingBottom">
    <div class="chakra-bar"><div class="chakra-fill" id="chakraFill"></div></div>
    <div class="bottom-row">
      <span class="writing-timer" id="writingTimer">8:00</span>
      <button class="send-btn" id="sendBtn">send</button>
    </div>
  </div>

  <!-- After send: chat conversation -->
  <div class="session-result" id="sessionResult">
    <!-- User's writing as a chat bubble -->
    <div class="chat-label right">you</div>
    <div class="chat-bubble user" id="resultWriting"></div>

    <!-- Anky's response bubble -->
    <div class="chat-label" id="ankyLabel">anky</div>
    <div class="chat-bubble anky" id="ankyBubble">
      <div class="thinking-dots" id="thinkingDots">
        <span></span><span></span><span></span>
        <span class="thinking-label">anky is reading your writing...</span>
      </div>
      <div class="result-reply" id="resultReply"></div>
    </div>

    <div class="result-actions" id="resultActions" style="display:none">
      <a href="/write">write again</a>
    </div>
  </div>
</div>

<script>
const CHAKRA_COLORS = ["#ff0000","#ff6600","#ffcc00","#33cc33","#3399ff","#6633cc","#9933ff","#ffffff"];
const IDLE_TIMEOUT = 8.0;
const IDLE_VISIBLE_AFTER = 3.0;
const SESSION_DURATION = 480.0;

const ankySession = (() => {
  let state = 'ready'; // ready | writing | paused | sent
  let sessionStarted = null;
  let lastInputAt = null;
  let activeTime = 0;       // only ticks while writing, freezes on pause
  let pausedAtActive = 0;   // activeTime when we paused
  let tickInterval = null;
  let keystrokeDeltas = [];
  let lastKeystrokeAt = null;
  let checkpointTimer = null;
  let sessionId = null;
  let sessionToken = null;
  const CHECKPOINT_INTERVAL = 30000;

  const writingArea = document.getElementById('writingArea');
  const writingPrompt = document.getElementById('writingPrompt');
  const writingTimer = document.getElementById('writingTimer');
  const chakraFill = document.getElementById('chakraFill');
  const idleBarFill = document.getElementById('idleBarFill');
  const sendBtn = document.getElementById('sendBtn');
  const writingBottom = document.getElementById('writingBottom');
  const sessionResult = document.getElementById('sessionResult');
  const resultWriting = document.getElementById('resultWriting');
  const resultReply = document.getElementById('resultReply');
  const resultActions = document.getElementById('resultActions');

  function generateSessionId() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
  }

  function saveCheckpoint() {
    if (!writingArea.value || writingArea.value.length === 0 || !sessionId) return;
    fetch('/api/checkpoint', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: sessionId,
        text: writingArea.value,
        elapsed: activeTime,
        session_token: sessionToken,
      }),
    }).then(r => r.json()).then(data => {
      if (data.session_token) sessionToken = data.session_token;
    }).catch(() => {});
  }

  let contextWarmed = false;

  function beginSession() {
    sessionStarted = Date.now();
    lastInputAt = Date.now();
    activeTime = 0;
    pausedAtActive = 0;
    keystrokeDeltas = [];
    lastKeystrokeAt = null;
    sessionId = generateSessionId();
    sessionToken = null;
    contextWarmed = false;
    state = 'writing';
    tickInterval = setInterval(tick, 100);
    checkpointTimer = setInterval(saveCheckpoint, CHECKPOINT_INTERVAL);
  }

  function resumeFromPause() {
    // Continue where we left off
    lastInputAt = Date.now();
    sessionStarted = Date.now() - (pausedAtActive * 1000);
    state = 'writing';
    sendBtn.classList.remove('visible');
    idleBarFill.style.width = '0%';
    idleBarFill.classList.remove('warning');
    if (!tickInterval) tickInterval = setInterval(tick, 100);
    if (!checkpointTimer) checkpointTimer = setInterval(saveCheckpoint, CHECKPOINT_INTERVAL);
    writingArea.focus();
  }

  // Keydown: start session, block backspace/delete/enter, track deltas
  writingArea.addEventListener('keydown', function(e) {
    if (state === 'sent') { e.preventDefault(); return; }

    if (state === 'ready') {
      // Only start session on printable characters — not Tab, arrows, meta keys
      if (e.key.length === 1) {
        beginSession();
        writingPrompt.classList.add('faded');
      }
    } else if (state === 'paused') {
      if (e.key === 'Enter') {
        e.preventDefault();
        doSend();
        return;
      }
      if (e.key === 'Backspace' || e.key === 'Delete') {
        e.preventDefault();
        return;
      }
      // Resume on any printable key
      if (e.key.length === 1) {
        resumeFromPause();
      }
    }

    if (e.key === 'Backspace' || e.key === 'Delete' || e.key === 'Enter') {
      e.preventDefault();
      return;
    }

    if (state === 'writing' && e.key.length === 1) {
      const now = Date.now();
      lastInputAt = now;
      if (lastKeystrokeAt) {
        keystrokeDeltas.push(now - lastKeystrokeAt);
      }
      lastKeystrokeAt = now;
      idleBarFill.style.width = '0%';
      idleBarFill.classList.remove('warning');
    }
  });

  // Strip newlines (mobile autocomplete edge case)
  writingArea.addEventListener('input', function() {
    if (state === 'paused') {
      // Input event from mobile without keydown — resume
      resumeFromPause();
    }
    if (writingArea.value.includes('\n')) {
      const pos = writingArea.selectionStart;
      writingArea.value = writingArea.value.replace(/\n/g, ' ');
      writingArea.selectionStart = writingArea.selectionEnd = pos;
    }
    // Update lastInputAt for mobile (keydown doesn't always fire for soft keyboards)
    if (state === 'writing') {
      lastInputAt = Date.now();
    }
  });

  writingArea.addEventListener('paste', function(e) { e.preventDefault(); });

  // Send button
  sendBtn.addEventListener('click', function() {
    if (state !== 'paused') return;
    doSend();
  });

  function tick() {
    if (state !== 'writing') return;
    const now = Date.now();
    activeTime = (now - sessionStarted) / 1000;
    const idleElapsed = (now - lastInputAt) / 1000;

    // Idle bar: visible after 3s, fills from 3s to 8s
    if (idleElapsed > IDLE_VISIBLE_AFTER && writingArea.value.length > 0) {
      const idleProgress = Math.min((idleElapsed - IDLE_VISIBLE_AFTER) / (IDLE_TIMEOUT - IDLE_VISIBLE_AFTER), 1);
      idleBarFill.style.width = (idleProgress * 100) + '%';
      idleBarFill.classList.add('warning');
    } else {
      idleBarFill.style.width = '0%';
      idleBarFill.classList.remove('warning');
    }

    // Pre-warm Honcho context at minute 6 so reflection starts instantly
    if (activeTime >= 360 && !contextWarmed) {
      contextWarmed = true;
      fetch('/api/warm-context', { method: 'POST' }).catch(function() {});
    }

    // Pause at 8s idle
    if (idleElapsed >= IDLE_TIMEOUT && writingArea.value.length > 0) {
      pauseSession();
      return;
    }

    updateTimerDisplay();
    updateChakra();
  }

  function pauseSession() {
    state = 'paused';
    pausedAtActive = activeTime;
    clearInterval(tickInterval);
    tickInterval = null;
    if (checkpointTimer) { clearInterval(checkpointTimer); checkpointTimer = null; }
    saveCheckpoint();

    // Show send button, keep idle bar full
    idleBarFill.style.width = '100%';
    idleBarFill.classList.add('warning');
    sendBtn.classList.add('visible');
  }

  function updateTimerDisplay() {
    const remaining = SESSION_DURATION - activeTime;
    if (remaining >= 0) {
      const mins = Math.floor(remaining / 60);
      const secs = Math.floor(remaining % 60);
      writingTimer.textContent = mins + ':' + String(secs).padStart(2, '0');
      writingTimer.classList.remove('past-zero');
    } else {
      const over = Math.abs(remaining);
      const mins = Math.floor(over / 60);
      const secs = Math.floor(over % 60);
      writingTimer.textContent = '+' + mins + ':' + String(secs).padStart(2, '0');
      writingTimer.classList.add('past-zero');
    }
  }

  function updateChakra() {
    const progress = Math.min(activeTime / SESSION_DURATION, 1);
    const colorIdx = Math.min(Math.floor(progress * 8), 7);
    const stops = [];
    for (let i = 0; i <= colorIdx; i++) {
      stops.push(CHAKRA_COLORS[i]);
    }
    chakraFill.style.background = stops.length === 1
      ? stops[0]
      : 'linear-gradient(to right, ' + stops.join(', ') + ')';
    chakraFill.style.width = (progress * 100) + '%';
  }

  function doSend() {
    state = 'sent';
    const text = writingArea.value;
    const words = text.split(/\s+/).filter(function(w) { return w.length > 0; }).length;
    const isAnky = activeTime >= 480 && words >= 300;
    console.log('[anky] doSend: duration=' + activeTime.toFixed(0) + 's, words=' + words + ', isAnky=' + isAnky);

    // Hide writing UI, show chat conversation
    writingArea.style.display = 'none';
    writingPrompt.style.display = 'none';
    writingBottom.style.display = 'none';
    document.querySelector('.idle-bar-wrap').style.display = 'none';

    // Show writing as chat bubble (truncated preview, scrollable)
    resultWriting.textContent = text;
    sessionResult.classList.add('visible');

    // Show thinking dots in anky bubble
    document.getElementById('thinkingDots').style.display = 'flex';

    document.getElementById('writingSurface').classList.add('scrollable');
    document.body.classList.add('scrollable');

    // Scroll to show anky's thinking bubble
    setTimeout(function() {
      document.getElementById('ankyBubble').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);

    sendToAnky(text);
  }

  function calcFlowScore() {
    if (keystrokeDeltas.length < 5) return 0;
    const mean = keystrokeDeltas.reduce((a, b) => a + b, 0) / keystrokeDeltas.length;
    const variance = keystrokeDeltas.reduce((a, d) => a + (d - mean) ** 2, 0) / keystrokeDeltas.length;
    const std = Math.sqrt(variance);
    const cv = mean > 0 ? std / mean : 1;
    const stability = Math.max(0, 1 - cv) * 0.45;
    const totalPause = keystrokeDeltas.filter(d => d > 2000).reduce((a, d) => a + d, 0) / 1000;
    const continuity = Math.max(0, 1 - totalPause / Math.max(activeTime, 1)) * 0.30;
    const density = Math.min(keystrokeDeltas.length / 700, 1) * 0.25;
    return Math.min(1, Math.max(0, stability + continuity + density));
  }

  function renderMarkdown(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/__(.+?)__/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/_(.+?)_/g, '<em>$1</em>')
      .replace(/^### (.+)$/gm, '<h4>$1</h4>')
      .replace(/^## (.+)$/gm, '<h3>$1</h3>')
      .replace(/^# (.+)$/gm, '<h3>$1</h3>')
      .replace(/^---$/gm, '<hr>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
      .replace(/\n\n+/g, '</p><p>')
      .replace(/\n/g, '<br>');
  }

  function setThinkingLabel(msg) {
    var label = document.querySelector('.thinking-label');
    if (label) label.textContent = msg;
    console.log('[anky] status:', msg);
  }

  async function sendToAnky(text) {
    const flowScore = calcFlowScore();
    const userToken = '{{ user_token | default(value="") }}';
    console.log('[anky] sending writing...', { duration: activeTime, words: text.split(/\s+/).length, flowScore: flowScore });

    try {
      setThinkingLabel('sending your writing...');
      const resp = await fetch('/write', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          text: text,
          duration: activeTime,
          user_token: userToken,
          flow_score: flowScore,
          session_id: sessionId,
          session_token: sessionToken,
          keystroke_deltas: keystrokeDeltas,
        }),
      });
      console.log('[anky] /write response status:', resp.status);
      const data = await resp.json();
      console.log('[anky] /write response:', { isAnky: data.isAnky, ankyId: data.ankyId, has_response: !!data.response, error: data.error });
      if (data.model || data.provider || data.generation_ms) {
        console.log('[anky] telemetry:', {
          provider: data.provider,
          model: data.model,
          generation_ms: data.generation_ms,
          tokens_used: data.tokens_used,
          generation_time: data.generation_ms ? (data.generation_ms / 1000).toFixed(1) + 's' : 'n/a',
        });
      }

      if (data.error) {
        console.error('[anky] server error:', data.error);
        document.getElementById('thinkingDots').style.display = 'none';
        resultReply.innerHTML = '<p>' + data.error + '</p>';
        resultActions.style.display = 'flex';
        return;
      }

      // Poll for ankyResponse + nextPrompt in background
      pollForAnkyPrompt(sessionId);

      if (data.ankyId) {
        setThinkingLabel('anky is reflecting on your words...');
        streamReflection(data.ankyId);
      } else {
        // Non-anky: show response directly
        console.log('[anky] non-anky response received, length:', (data.response || '').length);
        document.getElementById('thinkingDots').style.display = 'none';
        if (data.response) {
          var html = renderMarkdown(data.response);
          resultReply.innerHTML = '<p>' + html + '</p>';
        } else {
          resultReply.innerHTML = '<p>your writing is saved. anky is still thinking...</p>';
        }
        resultActions.style.display = 'flex';
      }
    } catch (e) {
      console.error('[anky] sendToAnky error:', e);
      document.getElementById('thinkingDots').style.display = 'none';
      resultReply.innerHTML = '<p>something went wrong. your writing is saved.</p>';
      resultActions.style.display = 'flex';
    }
  }

  // Poll status endpoint until we get ankyResponse + nextPrompt, then save to localStorage
  function pollForAnkyPrompt(sid) {
    let attempts = 0;
    const maxAttempts = 30; // ~60 seconds
    const poll = setInterval(async function() {
      attempts++;
      if (attempts > maxAttempts) { clearInterval(poll); return; }
      try {
        const r = await fetch('/api/writing/' + sid + '/status');
        if (!r.ok) return;
        const s = await r.json();
        if (s.ankyResponse) {
          localStorage.setItem('anky_last_response', s.ankyResponse);
        }
        if (s.nextPrompt) {
          localStorage.setItem('anky_last_prompt', s.nextPrompt);
          clearInterval(poll);
        }
        if (s.mood) {
          localStorage.setItem('anky_last_mood', s.mood);
        }
      } catch(e) {}
    }, 2000);
  }

  function streamReflection(ankyId, attempt) {
    attempt = attempt || 1;
    var maxRetries = 3;
    let rawText = '';
    let streamDone = false;
    let chunkCount = 0;
    let firstChunkAt = null;
    const startedAt = Date.now();

    console.log('[anky] streamReflection: opening SSE to /api/stream-reflection/' + ankyId + ' (attempt ' + attempt + ')');

    // Progress messages while waiting for first chunk
    const progressMessages = [
      { at: 3000, msg: 'anky is reading your words...' },
      { at: 8000, msg: 'anky is sitting with what you wrote...' },
      { at: 15000, msg: 'anky is finding the right words...' },
      { at: 25000, msg: 'anky is still reflecting... almost there...' },
      { at: 40000, msg: 'this one goes deep... anky is taking its time...' },
      { at: 60000, msg: 'still working on your reflection... hang tight...' },
    ];
    const progressTimers = progressMessages.map(function(p) {
      return setTimeout(function() {
        if (!firstChunkAt && !streamDone) {
          setThinkingLabel(p.msg);
        }
      }, p.at);
    });

    const es = new EventSource('/api/stream-reflection/' + ankyId);

    es.onopen = function() {
      console.log('[anky] SSE connection opened');
    };

    // Safety net: if nothing happens in 90s, stop waiting and show the link
    const safetyTimeout = setTimeout(function() {
      if (!streamDone) {
        console.warn('[anky] safety timeout hit (90s) — no data received');
        streamDone = true;
        progressTimers.forEach(clearTimeout);
        es.close();
        document.getElementById('thinkingDots').style.display = 'none';
        resultReply.innerHTML = '<p>anky is still processing your writing. it will be ready when you come back.</p>';
        resultActions.style.display = 'flex';
        var link = document.createElement('a');
        link.href = '/anky/' + ankyId;
        link.textContent = 'view anky';
        resultActions.appendChild(link);
      }
    }, 90000);

    es.onmessage = function(e) {
      // Skip keep-alive pings
      if (e.data === 'keep-alive') {
        console.log('[anky] SSE keep-alive ping received');
        return;
      }

      chunkCount++;
      if (!firstChunkAt) {
        firstChunkAt = Date.now();
        progressTimers.forEach(clearTimeout);
        console.log('[anky] first chunk received after ' + ((firstChunkAt - startedAt) / 1000).toFixed(1) + 's');
      }
      if (chunkCount <= 3 || chunkCount % 10 === 0) {
        console.log('[anky] chunk #' + chunkCount + ', data length: ' + e.data.length + ', total: ' + rawText.length);
      }

      // Hide thinking dots on first chunk
      var dots = document.getElementById('thinkingDots');
      if (dots.style.display !== 'none') dots.style.display = 'none';

      rawText += e.data + '\n';
      var html = renderMarkdown(rawText);
      html = '<p>' + html + '</p>';
      html = html.replace(/<p>\s*<\/p>/g, '');
      resultReply.innerHTML = html + '<span class="stream-cursor"></span>';
      window.scrollTo(0, document.body.scrollHeight);
    };

    es.addEventListener('telemetry', function(e) {
      try {
        var t = JSON.parse(e.data);
        console.log('[anky] stream telemetry:', {
          provider: t.provider,
          model: t.model,
          generation_time: (t.generation_ms / 1000).toFixed(1) + 's',
          input_tokens: t.input_tokens,
          output_tokens: t.output_tokens,
          total_tokens: t.total_tokens,
        });
      } catch(err) {
        console.log('[anky] telemetry (raw):', e.data);
      }
    });

    es.addEventListener('done', function() {
      if (streamDone) return;
      streamDone = true;
      progressTimers.forEach(clearTimeout);
      clearTimeout(safetyTimeout);
      es.close();
      var elapsed = ((Date.now() - startedAt) / 1000).toFixed(1);
      console.log('[anky] stream done. chunks: ' + chunkCount + ', total chars: ' + rawText.length + ', elapsed: ' + elapsed + 's');
      var cursor = resultReply.querySelector('.stream-cursor');
      if (cursor) cursor.remove();
      resultActions.style.display = 'flex';
      var link = document.createElement('a');
      link.href = '/anky/' + ankyId;
      link.textContent = 'view anky';
      resultActions.appendChild(link);
    });

    es.onerror = function(evt) {
      if (streamDone) return;
      streamDone = true;
      progressTimers.forEach(clearTimeout);
      clearTimeout(safetyTimeout);
      var elapsed = ((Date.now() - startedAt) / 1000).toFixed(1);
      console.error('[anky] SSE error after ' + elapsed + 's, readyState: ' + es.readyState + ', chunks received: ' + chunkCount);
      es.close();

      // Retry up to maxRetries times with increasing delay
      if (!rawText && attempt < maxRetries) {
        var delay = attempt * 3000;
        console.log('[anky] retrying in ' + (delay / 1000) + 's (attempt ' + (attempt + 1) + ')');
        setThinkingLabel('reconnecting to anky... (attempt ' + (attempt + 1) + ')');
        setTimeout(function() { streamReflection(ankyId, attempt + 1); }, delay);
        return;
      }
      document.getElementById('thinkingDots').style.display = 'none';
      if (rawText) {
        console.log('[anky] SSE errored but we have partial text (' + rawText.length + ' chars), showing it');
        var cursor = resultReply.querySelector('.stream-cursor');
        if (cursor) cursor.remove();
      } else {
        console.error('[anky] SSE failed with no data after ' + maxRetries + ' attempts');
        resultReply.innerHTML = '<p>anky couldn\'t connect right now. your writing is saved — the reflection will be ready when you come back.</p>';
      }
      resultActions.style.display = 'flex';
      var link = document.createElement('a');
      link.href = '/anky/' + ankyId;
      link.textContent = 'view anky';
      resultActions.appendChild(link);
    };
  }

  // Mobile keyboard: resize writing surface to visible viewport
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', function() {
      if (state !== 'sent') {
        document.getElementById('writingSurface').style.height = window.visualViewport.height + 'px';
      }
    });
  }

  // If Anky left a prompt from a previous session, show it instead of the server default
  const savedPrompt = localStorage.getItem('anky_last_prompt');
  if (savedPrompt) {
    writingPrompt.textContent = savedPrompt;
  }

  writingArea.focus();

  return { doSend };
})();
</script>
