{% extends "base.html" %}

{% block title %}anky — write{% endblock %}

{% block head %}
<meta property="og:title" content="anky — {{ t(key='writing.placeholder', lang=lang) }}">
<meta property="og:description" content="8 minutes. no stopping. no performing.">
<meta property="og:image" content="https://anky.app/api/og/write?prompt={{ t(key='writing.placeholder', lang=lang) | urlencode }}">
<meta property="og:type" content="website">
<meta property="og:url" content="https://anky.app/write">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="anky — {{ t(key='writing.placeholder', lang=lang) }}">
<meta name="twitter:description" content="8 minutes. no stopping. no performing.">
<meta name="twitter:image" content="https://anky.app/api/og/write?prompt={{ t(key='writing.placeholder', lang=lang) | urlencode }}">
<style>
  .navbar, .drawer, .drawer-overlay, .bottom-live-bar,
  .mobile-nav { display: none !important; }
  body { padding-bottom: 0 !important; }
  html, body { margin: 0; padding: 0; background: #0a0a0a; height: 100%; overflow: hidden; }

  .writing-surface {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
    font-family: system-ui, -apple-system, sans-serif;
    color: #e0e0e0;
    background: #0a0a0a;
    overflow: hidden;
  }
  .writing-surface.scrollable {
    height: auto;
    min-height: 100dvh;
    overflow: visible;
  }
  body.scrollable { overflow: auto; height: auto; }

  /* ── TOP: idle bar ── */
  .idle-bar-wrap {
    flex-shrink: 0;
    height: 3px;
    width: 100%;
    background: rgba(255,255,255,0.05);
  }
  .idle-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff9a3d 0%, #ff4444 100%);
    transition: width 0.1s linear;
    opacity: 0;
    margin-left: auto;
  }
  .idle-bar-fill.warning {
    opacity: 1;
    box-shadow: 0 0 12px rgba(255, 92, 68, 0.35);
  }

  /* ── PROMPT ── */
  .writing-prompt {
    padding: 16px 16px 0 16px;
    font-size: 17px;
    line-height: 1.6;
    color: #b366ff;
    font-style: italic;
    flex-shrink: 0;
    transition: opacity 0.6s, transform 0.4s, font-size 0.4s;
  }
  .writing-prompt.faded { opacity: 0.5; transform: translateY(-4px); font-size: 13px; }

  /* ── TEXTAREA ── */
  .writing-textarea {
    flex: 1;
    min-height: 0;
    margin: 12px 16px 0 16px;
    padding: 0;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-size: 18px;
    line-height: 1.8;
    color: #e8e0f0;
    font-family: system-ui, -apple-system, sans-serif;
    word-wrap: break-word;
    overflow-wrap: break-word;
    caret-color: #b366ff;
    overflow-y: auto;
    letter-spacing: 0.01em;
  }
  .writing-textarea::placeholder { color: rgba(179,102,255,0.25); }
  .writing-textarea::-webkit-scrollbar { width: 0; }

  /* ── BOTTOM BAR: timer + chakra + send ── */
  .writing-bottom {
    flex-shrink: 0;
    padding: 8px 16px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .chakra-bar {
    height: 3px;
    width: 100%;
    background: #1a1a1a;
    border-radius: 2px;
    overflow: hidden;
  }
  .chakra-fill {
    height: 100%;
    width: 0%;
    transition: width 0.1s linear;
  }
  .bottom-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    min-height: 44px;
  }
  .writing-timer {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 18px;
    color: #666;
    font-variant-numeric: tabular-nums;
  }
  .writing-timer.past-zero { color: #c4a0ff; }
  .send-btn {
    display: none;
    background: linear-gradient(135deg, #b366ff, #7b2ff7);
    color: #fff;
    border: none;
    border-radius: 24px;
    padding: 14px 48px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 0.08em;
    text-transform: lowercase;
    box-shadow: 0 0 20px rgba(123, 47, 247, 0.3);
  }
  .send-btn:hover {
    background: linear-gradient(135deg, #c084ff, #9b5ff7);
    box-shadow: 0 0 30px rgba(123, 47, 247, 0.5);
    transform: translateY(-1px);
  }
  .send-btn:active { transform: translateY(0); }
  .send-btn.visible {
    display: block;
    animation: sendPulse 2s ease-in-out infinite;
  }
  @keyframes sendPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(123, 47, 247, 0.3); }
    50% { box-shadow: 0 0 35px rgba(179, 102, 255, 0.5); }
  }

  /* ── AFTER SESSION: chat conversation ── */
  .session-result {
    display: none;
    padding: 16px 16px 40px 16px;
    flex-direction: column;
    gap: 16px;
  }
  .session-result.visible { display: flex; }

  /* ── Chat bubbles ── */
  .chat-bubble {
    max-width: 85%;
    border-radius: 18px;
    padding: 14px 18px;
    font-size: 15px;
    line-height: 1.7;
    word-wrap: break-word;
    overflow-wrap: break-word;
    animation: bubbleIn 0.3s ease-out;
  }
  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* User bubble: right-aligned */
  .chat-bubble.user {
    align-self: flex-end;
    background: #1a1a2e;
    border: 1px solid rgba(123, 47, 247, 0.15);
    border-bottom-right-radius: 4px;
    color: #c0c0c0;
    white-space: pre-wrap;
  }
  .chat-bubble.user::-webkit-scrollbar { width: 3px; }
  .chat-bubble.user::-webkit-scrollbar-thumb { background: rgba(123, 47, 247, 0.3); border-radius: 2px; }

  /* Anky bubble: left-aligned */
  .chat-bubble.anky {
    align-self: flex-start;
    background: #141414;
    border: 1px solid rgba(255,255,255,0.06);
    border-bottom-left-radius: 4px;
    color: rgba(255,255,255,0.8);
  }

  .chat-label {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    margin-bottom: 4px;
    text-transform: lowercase;
    letter-spacing: 0.5px;
  }
  .chat-label.right { text-align: right; }

  /* ── Thinking dots ── */
  .thinking-dots {
    display: flex;
    gap: 5px;
    padding: 4px 0;
    align-items: center;
  }
  .thinking-dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(123, 47, 247, 0.6);
    animation: dotPulse 1.4s ease-in-out infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
  .thinking-label {
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    margin-left: 8px;
  }

  /* ── Reply content (inside anky bubble) ── */
  .result-reply {
    font-size: 15px;
    line-height: 1.7;
    color: rgba(255,255,255,0.82);
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  /* After stream completes, switch to rendered markdown */
  .result-reply.rendered {
    white-space: normal;
  }
  .result-reply.rendered p { margin: 0 0 12px 0; }
  .result-reply.rendered h2, .result-reply.rendered h3 { font-size: 17px; font-weight: 500; color: rgba(255,255,255,0.85); margin: 20px 0 8px 0; }
  .result-reply.rendered h4 { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.8); margin: 16px 0 6px 0; }
  .result-reply.rendered strong { color: rgba(255,255,255,0.9); }
  .result-reply.rendered em { color: rgba(255,255,255,0.65); font-style: italic; }
  .result-reply.rendered blockquote { border-left: 2px solid rgba(255,255,255,0.1); margin: 12px 0; padding: 4px 12px; color: rgba(255,255,255,0.5); }
  .result-reply.rendered ul { padding-left: 20px; margin: 8px 0; }
  .result-reply.rendered li { margin-bottom: 4px; }
  .result-reply.rendered hr { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 16px 0; }
  .result-reply.rendered code { background: rgba(255,255,255,0.05); padding: 1px 4px; border-radius: 3px; font-size: 13px; }
  .result-reply.rendered pre { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
  .result-reply.rendered pre code { background: none; padding: 0; }

  .stream-cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: #7b2ff7;
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .result-actions {
    margin-top: 8px;
    display: flex;
    gap: 12px;
    align-self: flex-start;
  }
  .result-actions a, .result-actions button {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.4);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
  }
  .result-actions a:hover, .result-actions button:hover {
    border-color: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.6);
  }
  .retry-btn {
    border-color: rgba(123, 47, 247, 0.4) !important;
    color: rgba(123, 47, 247, 0.8) !important;
  }
  .retry-btn:hover {
    border-color: rgba(123, 47, 247, 0.7) !important;
    color: #7b2ff7 !important;
    background: rgba(123, 47, 247, 0.08) !important;
  }

  /* Auth indicator (top-right) */
  .auth-indicator {
    position: fixed; top: 12px; right: 16px; z-index: 100;
    display: flex; align-items: center; gap: 8px;
    padding-top: max(0px, env(safe-area-inset-top));
  }
  .auth-pfp {
    width: 28px; height: 28px; border-radius: 50%; object-fit: cover;
    border: 1px solid rgba(179,102,255,0.3);
  }
  .auth-login-hint {
    display: flex; align-items: center; gap: 6px; cursor: pointer;
    padding: 6px 12px; border-radius: 16px;
    background: rgba(179,102,255,0.08); border: 1px solid rgba(179,102,255,0.15);
    font-size: 11px; color: rgba(179,102,255,0.5); letter-spacing: 0.05em;
    text-decoration: none; transition: all 0.2s;
  }
  .auth-login-hint:hover { background: rgba(179,102,255,0.12); }
  .auth-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(179,102,255,0.5); animation: authPulse 2s ease-in-out infinite;
  }
  @keyframes authPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* Copy-to-platform buttons (anonymous post-write) */
  .share-platforms {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
    margin-top: 16px; align-self: center;
  }
  .platform-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 20px; border-radius: 12px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.5); font-size: 13px; cursor: pointer;
    text-decoration: none; transition: all 0.2s;
  }
  .platform-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }
  .platform-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
  .share-label {
    font-size: 11px; color: rgba(255,255,255,0.2); letter-spacing: 0.1em;
    text-transform: uppercase; margin-top: 20px; align-self: center;
  }
  .anon-writing-display {
    font-size: 14px; line-height: 1.8; color: rgba(255,255,255,0.5);
    white-space: pre-wrap; word-wrap: break-word; max-height: 200px;
    overflow-y: auto; margin-bottom: 12px; padding: 16px;
    background: rgba(255,255,255,0.02); border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.04);
  }
</style>
{% endblock %}

{% block content %}
<!-- Auth indicator -->
{% if logged_in %}
<div class="auth-indicator">
  <img class="auth-pfp" src="{{ profile_image_url | default(value='/static/icon-192.png') }}" alt="">
</div>
{% else %}
<div class="auth-indicator">
  <a class="auth-login-hint" href="/login">
    <span class="auth-dot"></span>
    not logged in
  </a>
</div>
{% endif %}

<div class="writing-surface" id="writingSurface">
  <!-- TOP: idle countdown bar -->
  <div class="idle-bar-wrap"><div class="idle-bar-fill" id="idleBarFill"></div></div>

  <textarea class="writing-textarea" id="writingArea" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="{{ t(key='writing.placeholder', lang=lang) }}"></textarea>

  <!-- BOTTOM: chakra bar + timer + send button -->
  <div class="writing-bottom" id="writingBottom">
    <div class="chakra-bar"><div class="chakra-fill" id="chakraFill"></div></div>
    <div class="bottom-row">
      <span class="writing-timer" id="writingTimer">8:00</span>
      <button class="send-btn" id="sendBtn">send</button>
    </div>
  </div>

  <!-- After send: chat conversation -->
  <div class="session-result" id="sessionResult">
    <!-- User's writing as a chat bubble -->
    <div class="chat-label right">you</div>
    <div class="chat-bubble user" id="resultWriting"></div>

    <!-- Anky's response bubble -->
    <div class="chat-label" id="ankyLabel">anky</div>
    <div class="chat-bubble anky" id="ankyBubble">
      <div class="thinking-dots" id="thinkingDots">
        <span></span><span></span><span></span>
        <span class="thinking-label">anky is reading your writing...</span>
      </div>
      <div class="result-reply" id="resultReply"></div>
    </div>

    <div class="result-actions" id="resultActions" style="display:none">
      <a href="/write">write again</a>
    </div>
  </div>

  <!-- Anonymous post-write: copy to platforms -->
  <div id="anonResult" style="display:none">
    <div class="anon-writing-display" id="anonWriting"></div>
    <div class="share-label">take your writing somewhere</div>
    <div class="share-platforms">
      <button class="platform-btn" id="shareX" title="post on X">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        X
      </button>
      <button class="platform-btn" id="shareFarcaster" title="cast on Farcaster">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5.233 3h13.534v2.4H22v1.8h-1.617v9.6c.893 0 1.617.806 1.617 1.8v1.2c0 .994-.724 1.8-1.617 1.8H3.617C2.724 21.6 2 20.794 2 19.8v-1.2c0-.994.724-1.8 1.617-1.8V7.2H2V5.4h3.233V3zm3.234 7.2c0-1.988 1.448-3.6 3.233-3.6h.6c1.785 0 3.233 1.612 3.233 3.6v6h-2.4v-6c0-.663-.373-1.2-.833-1.2h-.6c-.46 0-.833.537-.833 1.2v6h-2.4v-6z"/></svg>
        Warpcast
      </button>
      <button class="platform-btn" id="shareClaude" title="chat with Claude">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H7l5-8v4h4l-5 8z"/></svg>
        Claude
      </button>
      <button class="platform-btn" id="shareChatGPT" title="chat with ChatGPT">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M12 7v5l3 3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        ChatGPT
      </button>
    </div>
    <div style="margin-top:24px; text-align:center;">
      <a href="/write" style="font-size:13px; color:rgba(255,255,255,0.25); text-decoration:none;">write again</a>
    </div>
  </div>
</div>

<script src="/static/anky-write-protocol.js"></script>
<script>
const CHAKRA_COLORS = ["#ff0000","#ff6600","#ffcc00","#33cc33","#3399ff","#6633cc","#9933ff","#ffffff"];
const IDLE_TIMEOUT = 8.0;
const IDLE_VISIBLE_AFTER = 3.0;
const SESSION_DURATION = 480.0;

const ankySession = (() => {
  let state = 'ready'; // ready | writing | paused | sent
  let sessionStarted = null;
  let lastInputAt = null;
  let activeTime = 0;       // only ticks while writing, freezes on pause
  let pausedAtActive = 0;   // activeTime when we paused
  let tickInterval = null;
  let keystrokeDeltas = [];
  let lastKeystrokeAt = null;
  let checkpointTimer = null;
  let sessionId = null;
  let sessionToken = null;
  let protocolCapture = window.AnkyWriteProtocol.createCapture();
  const CHECKPOINT_INTERVAL = 30000;

  const writingArea = document.getElementById('writingArea');
  const writingTimer = document.getElementById('writingTimer');
  const chakraFill = document.getElementById('chakraFill');
  const idleBarFill = document.getElementById('idleBarFill');
  const sendBtn = document.getElementById('sendBtn');
  const writingBottom = document.getElementById('writingBottom');
  const sessionResult = document.getElementById('sessionResult');
  const resultWriting = document.getElementById('resultWriting');
  const resultReply = document.getElementById('resultReply');
  const resultActions = document.getElementById('resultActions');

  function generateSessionId() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
  }

  function saveCheckpoint() {
    if (!writingArea.value || writingArea.value.length === 0 || !sessionId) return;
    fetch('/api/checkpoint', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: sessionId,
        text: writingArea.value,
        elapsed: activeTime,
        session_token: sessionToken,
      }),
    }).then(r => r.json()).then(data => {
      if (data.session_token) sessionToken = data.session_token;
    }).catch(() => {});
  }

  let contextWarmed = false;

  function beginSession() {
    sessionStarted = Date.now();
    lastInputAt = Date.now();
    activeTime = 0;
    pausedAtActive = 0;
    keystrokeDeltas = [];
    lastKeystrokeAt = null;
    protocolCapture = window.AnkyWriteProtocol.createCapture();
    sessionId = generateSessionId();
    sessionToken = null;
    contextWarmed = false;
    state = 'writing';
    document.body.className = 'home-writing';
    tickInterval = setInterval(tick, 100);
    checkpointTimer = setInterval(saveCheckpoint, CHECKPOINT_INTERVAL);
  }

  function resumeFromPause() {
    // Continue where we left off
    lastInputAt = Date.now();
    sessionStarted = Date.now() - (pausedAtActive * 1000);
    state = 'writing';
    document.body.className = 'home-writing';
    sendBtn.classList.remove('visible');
    idleBarFill.style.width = '0%';
    idleBarFill.classList.remove('warning');
    if (!tickInterval) tickInterval = setInterval(tick, 100);
    if (!checkpointTimer) checkpointTimer = setInterval(saveCheckpoint, CHECKPOINT_INTERVAL);
    writingArea.focus();
  }

  function keepCaretAtEnd() {
    requestAnimationFrame(function() {
      const end = writingArea.value.length;
      writingArea.setSelectionRange(end, end);
    });
  }

  function syncWritingAreaToProtocol() {
    const text = window.AnkyWriteProtocol.reconstructText(protocolCapture.entries);
    if (writingArea.value !== text) {
      writingArea.value = text;
    }
    keepCaretAtEnd();
    return text;
  }

  async function signSessionHashIfConnected(hash) {
    const expectedWallet = '{{ wallet_address | default(value="") }}';
    if (!expectedWallet) return null;

    const provider =
      (window.phantom && window.phantom.solana) ||
      window.solana ||
      null;
    if (!provider || !provider.isConnected || !provider.publicKey || typeof provider.signMessage !== 'function') {
      return null;
    }

    const providerWallet = provider.publicKey.toString();
    if (providerWallet !== expectedWallet) {
      return null;
    }

    try {
      const signed = await provider.signMessage(new TextEncoder().encode(hash), 'utf8');
      const signatureBytes = signed && signed.signature ? signed.signature : signed;
      return window.AnkyWriteProtocol.base58Encode(signatureBytes);
    } catch (error) {
      console.warn('[anky] wallet signature skipped:', error);
      return null;
    }
  }

  async function finalizeProtocolSession() {
    if (!protocolCapture.entries.length) {
      window.AnkyWriteProtocol.showVisibleError('No accepted keystrokes were captured for this session.');
      return null;
    }

    try {
      const finalized = await window.AnkyWriteProtocol.buildFinalizedSession(protocolCapture.entries);
      const verified = await window.AnkyWriteProtocol.verifyHash(finalized.content, finalized.hash);
      if (!verified) {
        throw new Error('SHA-256 verification failed before storage and download.');
      }
      await window.AnkyWriteProtocol.storeCompletedSession(finalized);
      window.AnkyWriteProtocol.offerDownload(finalized);
      return finalized;
    } catch (error) {
      window.AnkyWriteProtocol.showVisibleError(error && error.message ? error.message : 'Protocol verification failed.');
      return null;
    }
  }

  async function submitProtocolSession(protocolSession) {
    const walletSignature = await signSessionHashIfConnected(protocolSession.hash);
    const payload = {
      session_hash: protocolSession.hash,
      session: protocolSession.content,
      duration_seconds: protocolSession.duration_seconds,
      word_count: protocolSession.word_count,
      kingdom: protocolSession.kingdom,
      started_at: protocolSession.started_at,
    };
    if (walletSignature) {
      payload.wallet_signature = walletSignature;
    }

    try {
      const response = await fetch('/api/anky/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await response.json().catch(function() { return {}; });
      if (!response.ok || data.error) {
        throw new Error(data.error || 'The protocol submit failed.');
      }
      await window.AnkyWriteProtocol.updateSubmitState(protocolSession.hash, 'submitted');
      return data;
    } catch (error) {
      await window.AnkyWriteProtocol.updateSubmitState(protocolSession.hash, 'failed').catch(function() {});
      throw error;
    }
  }

  // Keydown: start session, block editing/navigation, and append protocol entries.
  writingArea.addEventListener('keydown', function(e) {
    if (state === 'sent') { e.preventDefault(); return; }
    const rejected = window.AnkyWriteProtocol.isRejectedKeydown(e);
    const atEnd =
      writingArea.selectionStart === writingArea.value.length &&
      writingArea.selectionEnd === writingArea.value.length;

    if (state === 'ready') {
      if (!rejected) {
        beginSession();
      }
    } else if (state === 'paused') {
      if (e.key === 'Enter') {
        e.preventDefault();
        doSend();
        return;
      }
      if (!rejected) {
        resumeFromPause();
      }
    }

    if (!atEnd) {
      e.preventDefault();
      keepCaretAtEnd();
      return;
    }

    if (rejected) {
      if (!['Shift', 'Meta', 'Alt', 'Control'].includes(e.key)) {
        e.preventDefault();
      }
      return;
    }

    if (state === 'writing') {
      const captured = window.AnkyWriteProtocol.captureKeydown(protocolCapture, e, Date.now());
      if (!captured.accepted) {
        e.preventDefault();
        return;
      }
      lastInputAt = captured.now;
      if (!captured.first) {
        keystrokeDeltas.push(captured.entry.ms);
      }
      lastKeystrokeAt = captured.now;
      idleBarFill.style.width = '0%';
      idleBarFill.classList.remove('warning');
      requestAnimationFrame(syncWritingAreaToProtocol);
    }
  });

  writingArea.addEventListener('input', function() {
    syncWritingAreaToProtocol();
    if (state === 'writing') {
      lastInputAt = Date.now();
    }
  });

  writingArea.addEventListener('paste', function(e) { e.preventDefault(); });
  writingArea.addEventListener('click', keepCaretAtEnd);
  writingArea.addEventListener('focus', keepCaretAtEnd);

  // Send button
  sendBtn.addEventListener('click', function() {
    if (state !== 'paused') return;
    doSend();
  });

  function tick() {
    if (state !== 'writing') return;
    const now = Date.now();
    activeTime = (now - sessionStarted) / 1000;
    const idleElapsed = (now - lastInputAt) / 1000;

    // Idle bar: visible after 3s, fills from 3s to 8s
    if (idleElapsed > IDLE_VISIBLE_AFTER && writingArea.value.length > 0) {
      const idleProgress = Math.min((idleElapsed - IDLE_VISIBLE_AFTER) / (IDLE_TIMEOUT - IDLE_VISIBLE_AFTER), 1);
      idleBarFill.style.width = (idleProgress * 100) + '%';
      idleBarFill.classList.add('warning');
    } else {
      idleBarFill.style.width = '0%';
      idleBarFill.classList.remove('warning');
    }

    // Pre-warm Honcho context at minute 6 so reflection starts instantly
    if (activeTime >= 360 && !contextWarmed) {
      contextWarmed = true;
      fetch('/api/warm-context', { method: 'POST' }).catch(function() {});
    }

    // Pause at 8s idle
    if (idleElapsed >= IDLE_TIMEOUT && writingArea.value.length > 0) {
      pauseSession();
      return;
    }

    updateTimerDisplay();
    updateChakra();
  }

  function pauseSession() {
    state = 'paused';
    document.body.className = 'home-paused';
    pausedAtActive = activeTime;
    clearInterval(tickInterval);
    tickInterval = null;
    if (checkpointTimer) { clearInterval(checkpointTimer); checkpointTimer = null; }
    saveCheckpoint();

    // Show send button, keep idle bar full
    idleBarFill.style.width = '100%';
    idleBarFill.classList.add('warning');
    sendBtn.classList.add('visible');
  }

  function updateTimerDisplay() {
    const remaining = SESSION_DURATION - activeTime;
    if (remaining >= 0) {
      const mins = Math.floor(remaining / 60);
      const secs = Math.floor(remaining % 60);
      writingTimer.textContent = mins + ':' + String(secs).padStart(2, '0');
      writingTimer.classList.remove('past-zero');
    } else {
      const over = Math.abs(remaining);
      const mins = Math.floor(over / 60);
      const secs = Math.floor(over % 60);
      writingTimer.textContent = '+' + mins + ':' + String(secs).padStart(2, '0');
      writingTimer.classList.add('past-zero');
    }
  }

  function updateChakra() {
    const progress = Math.min(activeTime / SESSION_DURATION, 1);
    const colorIdx = Math.min(Math.floor(progress * 8), 7);
    const stops = [];
    for (let i = 0; i <= colorIdx; i++) {
      stops.push(CHAKRA_COLORS[i]);
    }
    chakraFill.style.background = stops.length === 1
      ? stops[0]
      : 'linear-gradient(to right, ' + stops.join(', ') + ')';
    chakraFill.style.width = (progress * 100) + '%';
  }

  async function doSend() {
    state = 'sent';
    document.body.className = 'home-ended';
    const protocolSession = await finalizeProtocolSession();
    if (!protocolSession) {
      state = 'paused';
      document.body.className = 'home-paused';
      sendBtn.classList.add('visible');
      return;
    }

    const text = protocolSession.text;
    const words = protocolSession.word_count;
    const durationSeconds = protocolSession.duration_seconds;
    const isAnky = durationSeconds >= 480 && words >= 300;
    const isLoggedIn = {% if logged_in %}true{% else %}false{% endif %};
    console.log('[anky] doSend: duration=' + durationSeconds + 's, words=' + words + ', isAnky=' + isAnky + ', loggedIn=' + isLoggedIn);

    // Hide writing UI
    writingArea.style.display = 'none';
    writingBottom.style.display = 'none';
    document.querySelector('.idle-bar-wrap').style.display = 'none';
    document.getElementById('writingSurface').classList.add('scrollable');
    document.body.classList.add('scrollable');

    if (!isLoggedIn) {
      // Anonymous: show writing + copy-to-platform buttons
      document.getElementById('anonWriting').textContent = text;
      document.getElementById('anonResult').style.display = 'block';

      // Wire share buttons
      document.getElementById('shareX').onclick = function() {
        const truncated = text.length > 250 ? text.substring(0, 247) + '...' : text;
        window.open('https://x.com/intent/tweet?text=' + encodeURIComponent(truncated), '_blank');
      };
      document.getElementById('shareFarcaster').onclick = function() {
        const truncated = text.length > 900 ? text.substring(0, 897) + '...' : text;
        window.open('https://warpcast.com/~/compose?text=' + encodeURIComponent(truncated), '_blank');
      };
      document.getElementById('shareClaude').onclick = function() {
        navigator.clipboard.writeText(text).then(function() {
          window.open('https://claude.ai/new', '_blank');
        });
      };
      document.getElementById('shareChatGPT').onclick = function() {
        navigator.clipboard.writeText(text).then(function() {
          window.open('https://chatgpt.com/', '_blank');
        });
      };
      submitProtocolSession(protocolSession).catch(function(error) {
        window.AnkyWriteProtocol.showVisibleError(
          error && error.message ? error.message : 'The protocol submit failed.'
        );
      });
      return;
    }

    // Authenticated: show chat conversation + send to anky
    resultWriting.textContent = text;
    sessionResult.classList.add('visible');
    document.getElementById('thinkingDots').style.display = 'flex';

    setTimeout(function() {
      document.getElementById('ankyBubble').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);

    sendToAnky(protocolSession);
  }

  function calcFlowScore(durationSeconds) {
    if (keystrokeDeltas.length < 5) return 0;
    const mean = keystrokeDeltas.reduce((a, b) => a + b, 0) / keystrokeDeltas.length;
    const variance = keystrokeDeltas.reduce((a, d) => a + (d - mean) ** 2, 0) / keystrokeDeltas.length;
    const std = Math.sqrt(variance);
    const cv = mean > 0 ? std / mean : 1;
    const stability = Math.max(0, 1 - cv) * 0.45;
    const totalPause = keystrokeDeltas.filter(d => d > 2000).reduce((a, d) => a + d, 0) / 1000;
    const continuity = Math.max(0, 1 - totalPause / Math.max(durationSeconds || 0, 1)) * 0.30;
    const density = Math.min(keystrokeDeltas.length / 700, 1) * 0.25;
    return Math.min(1, Math.max(0, stability + continuity + density));
  }

  // Strip markdown syntax so streaming text reads clean
  function cleanText(text) {
    return text
      .replace(/^#{1,4}\s+/gm, '')
      .replace(/\*\*\*(.+?)\*\*\*/g, '$1')
      .replace(/\*\*(.+?)\*\*/g, '$1')
      .replace(/__(.+?)__/g, '$1')
      .replace(/\*(.+?)\*/g, '$1')
      .replace(/_(.+?)_/g, '$1')
      .replace(/^[-*]\s+/gm, '• ')
      .replace(/^>\s?/gm, '')
      .replace(/^---+$/gm, '')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/```[\s\S]*?```/g, '')
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');
  }

  // Full markdown renderer — only used after streaming is complete
  function escapeHtml(s) {
    var div = document.createElement('div');
    div.textContent = String(s == null ? '' : s);
    return div.innerHTML;
  }
  function renderInline(text) {
    var h = escapeHtml(text);
    h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
    h = h.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
    h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    h = h.replace(/__([^_]+)__/g, '<strong>$1</strong>');
    h = h.replace(/(^|[\s(])\*([^*\n]+)\*(?=$|[\s).,!?:;])/g, '$1<em>$2</em>');
    h = h.replace(/(^|[\s(])_([^_\n]+)_(?=$|[\s).,!?:;])/g, '$1<em>$2</em>');
    return h;
  }
  function renderMarkdown(text) {
    var lines = String(text || '').replace(/\r/g, '').split('\n');
    var out = [], para = [], list = [], inCode = false, code = [];
    function flushPara() { if (para.length) { out.push('<p>' + para.map(renderInline).join('<br>') + '</p>'); para = []; } }
    function flushList() { if (list.length) { out.push('<ul>' + list.map(function(i){ return '<li>' + renderInline(i) + '</li>'; }).join('') + '</ul>'); list = []; } }
    function flushCode() { if (code.length) { out.push('<pre><code>' + escapeHtml(code.join('\n')) + '</code></pre>'); code = []; } }
    lines.forEach(function(line) {
      if (line.trim().slice(0,3) === '```') { flushPara(); flushList(); if (inCode) { flushCode(); inCode = false; } else { inCode = true; } return; }
      if (inCode) { code.push(line); return; }
      if (!line.trim()) { flushPara(); flushList(); return; }
      var hm = line.match(/^(#{1,4})\s+(.+)$/);
      if (hm) { flushPara(); flushList(); var lvl = Math.min(hm[1].length+1,4); out.push('<h'+lvl+'>'+renderInline(hm[2])+'</h'+lvl+'>'); return; }
      if (/^---+$/.test(line.trim())) { flushPara(); flushList(); out.push('<hr>'); return; }
      var qm = line.match(/^>\s?(.*)$/);
      if (qm) { flushPara(); flushList(); out.push('<blockquote>'+renderInline(qm[1])+'</blockquote>'); return; }
      var bm = line.match(/^\s*[-*]\s+(.+)$/);
      if (bm) { flushPara(); list.push(bm[1]); return; }
      flushList(); para.push(line);
    });
    flushPara(); flushList(); flushCode();
    return out.join('');
  }

  function setThinkingLabel(msg) {
    var label = document.querySelector('.thinking-label');
    if (label) label.textContent = msg;
    console.log('[anky] status:', msg);
  }

  async function sendToAnky(protocolSession) {
    const text = protocolSession.text;
    const flowScore = calcFlowScore(protocolSession.duration_seconds);
    console.log('[anky] sending writing...', {
      duration: protocolSession.duration_seconds,
      words: protocolSession.word_count,
      flowScore: flowScore,
      sessionHash: protocolSession.hash,
    });

    try {
      setThinkingLabel('sending your writing...');
      const data = await submitProtocolSession(protocolSession);
      console.log('[anky] /api/anky/submit response:', {
        isAnky: data.isAnky,
        ankyId: data.ankyId,
        has_response: !!data.response,
        error: data.error,
      });
      if (data.model || data.provider || data.generation_ms) {
        console.log('[anky] telemetry:', {
          provider: data.provider,
          model: data.model,
          generation_ms: data.generation_ms,
          tokens_used: data.tokens_used,
          generation_time: data.generation_ms ? (data.generation_ms / 1000).toFixed(1) + 's' : 'n/a',
        });
      }

      if (data.error) {
        console.error('[anky] server error:', data.error);
        document.getElementById('thinkingDots').style.display = 'none';
        if (data.ankyId) {
          showRetryUI(data.ankyId, data.error);
        } else {
          resultReply.innerHTML = '<p>' + data.error + '</p>';
          resultActions.style.display = 'flex';
        }
        return;
      }

      pollForAnkyStatus(protocolSession.hash);

      if (data.ankyId) {
        setThinkingLabel('anky is reflecting on your words...');
        streamReflection(data.ankyId);
      } else {
        // Non-anky: show response directly
        console.log('[anky] non-anky response received, length:', (data.response || '').length);
        document.getElementById('thinkingDots').style.display = 'none';
        if (data.response) {
          resultReply.textContent = cleanText(data.response);
        } else {
          resultReply.innerHTML = '<p>your writing is saved. anky is still thinking...</p>';
        }
        resultActions.style.display = 'flex';
      }
    } catch (e) {
      console.error('[anky] sendToAnky error:', e);
      document.getElementById('thinkingDots').style.display = 'none';
      window.AnkyWriteProtocol.showVisibleError(
        e && e.message ? e.message : 'The protocol submit failed.'
      );
      resultReply.innerHTML = '<p>something went wrong. your writing is saved.</p>';
      resultActions.style.display = 'flex';
    }
  }

  function pollForAnkyStatus(sid) {
    let attempts = 0;
    const maxAttempts = 30; // ~60 seconds
    const poll = setInterval(async function() {
      attempts++;
      if (attempts > maxAttempts) { clearInterval(poll); return; }
      try {
        const r = await fetch('/api/writing/' + sid + '/status');
        if (!r.ok) return;
        const s = await r.json();
        if (s.ankyResponse) {
          localStorage.setItem('anky_last_response', s.ankyResponse);
        }
        if (s.mood) {
          localStorage.setItem('anky_last_mood', s.mood);
        }
      } catch(e) {}
    }, 2000);
  }

  function showRetryUI(ankyId, message) {
    resultReply.innerHTML = '<p>' + message + '</p>';
    resultActions.innerHTML = '';
    resultActions.style.display = 'flex';

    var retryBtn = document.createElement('button');
    retryBtn.textContent = 'retry reflection';
    retryBtn.className = 'retry-btn';
    retryBtn.onclick = function() {
      resultReply.innerHTML = '';
      resultActions.innerHTML = '';
      resultActions.style.display = 'none';
      document.getElementById('thinkingDots').style.display = 'flex';
      setThinkingLabel('retrying...');
      streamReflection(ankyId, 1);
    };
    resultActions.appendChild(retryBtn);

    var link = document.createElement('a');
    link.href = '/anky/' + ankyId;
    link.textContent = 'view anky';
    resultActions.appendChild(link);
  }

  function streamReflection(ankyId, attempt) {
    attempt = attempt || 1;
    var maxRetries = 3;
    let rawText = '';
    let streamDone = false;
    let chunkCount = 0;
    let firstChunkAt = null;
    const startedAt = Date.now();

    console.log('[anky] streamReflection: opening SSE to /api/stream-reflection/' + ankyId + ' (attempt ' + attempt + ')');

    // Progress messages while waiting for first chunk
    const progressMessages = [
      { at: 3000, msg: 'anky is reading your words...' },
      { at: 8000, msg: 'anky is sitting with what you wrote...' },
      { at: 15000, msg: 'anky is finding the right words...' },
      { at: 25000, msg: 'anky is still reflecting... almost there...' },
      { at: 40000, msg: 'this one goes deep... anky is taking its time...' },
      { at: 60000, msg: 'still working on your reflection... hang tight...' },
    ];
    const progressTimers = progressMessages.map(function(p) {
      return setTimeout(function() {
        if (!firstChunkAt && !streamDone) {
          setThinkingLabel(p.msg);
        }
      }, p.at);
    });

    const es = new EventSource('/api/stream-reflection/' + ankyId);

    es.onopen = function() {
      console.log('[anky] SSE connection opened');
    };

    // Safety net: if nothing happens in 90s, stop waiting and show the link
    const safetyTimeout = setTimeout(function() {
      if (!streamDone) {
        console.warn('[anky] safety timeout hit (90s) — no data received');
        streamDone = true;
        progressTimers.forEach(clearTimeout);
        es.close();
        document.getElementById('thinkingDots').style.display = 'none';
        showRetryUI(ankyId, 'anky is taking too long. your writing is saved.');
      }
    }, 90000);

    es.onmessage = function(e) {
      // Skip keep-alive pings
      if (e.data === 'keep-alive') {
        console.log('[anky] SSE keep-alive ping received');
        return;
      }

      chunkCount++;
      if (!firstChunkAt) {
        firstChunkAt = Date.now();
        progressTimers.forEach(clearTimeout);
        console.log('[anky] first chunk received after ' + ((firstChunkAt - startedAt) / 1000).toFixed(1) + 's');
      }
      if (chunkCount <= 3 || chunkCount % 10 === 0) {
        console.log('[anky] chunk #' + chunkCount + ', data length: ' + e.data.length + ', total: ' + rawText.length);
      }

      // Hide thinking dots on first chunk
      var dots = document.getElementById('thinkingDots');
      if (dots.style.display !== 'none') dots.style.display = 'none';

      // Detect error messages from the server
      if (e.data.startsWith('error:') || e.data === '__reflection_failed__') {
        streamDone = true;
        progressTimers.forEach(clearTimeout);
        clearTimeout(safetyTimeout);
        es.close();
        dots.style.display = 'none';
        showRetryUI(ankyId, e.data === '__reflection_failed__'
          ? 'all reflection providers failed. your writing is saved.'
          : e.data.replace(/^error:\s*/, ''));
        return;
      }

      rawText += e.data;
      resultReply.textContent = cleanText(rawText);
      // Re-append cursor after textContent wipe
      if (!resultReply.querySelector('.stream-cursor')) {
        resultReply.appendChild(document.createElement('span')).className = 'stream-cursor';
      }
      window.scrollTo(0, document.body.scrollHeight);
    };

    es.addEventListener('telemetry', function(e) {
      try {
        var t = JSON.parse(e.data);
        console.log('[anky] stream telemetry:', {
          provider: t.provider,
          model: t.model,
          generation_time: (t.generation_ms / 1000).toFixed(1) + 's',
          input_tokens: t.input_tokens,
          output_tokens: t.output_tokens,
          total_tokens: t.total_tokens,
        });
      } catch(err) {
        console.log('[anky] telemetry (raw):', e.data);
      }
    });

    es.addEventListener('done', function() {
      if (streamDone) return;
      streamDone = true;
      progressTimers.forEach(clearTimeout);
      clearTimeout(safetyTimeout);
      es.close();
      var elapsed = ((Date.now() - startedAt) / 1000).toFixed(1);
      console.log('[anky] stream done. chunks: ' + chunkCount + ', total chars: ' + rawText.length + ', elapsed: ' + elapsed + 's');
      // Render final markdown now that full text is available
      resultReply.innerHTML = renderMarkdown(rawText);
      resultReply.classList.add('rendered');
      resultActions.style.display = 'flex';
      var link = document.createElement('a');
      link.href = '/anky/' + ankyId;
      link.textContent = 'view anky';
      resultActions.appendChild(link);
    });

    es.onerror = function(evt) {
      if (streamDone) return;
      streamDone = true;
      progressTimers.forEach(clearTimeout);
      clearTimeout(safetyTimeout);
      var elapsed = ((Date.now() - startedAt) / 1000).toFixed(1);
      console.error('[anky] SSE error after ' + elapsed + 's, readyState: ' + es.readyState + ', chunks received: ' + chunkCount);
      es.close();

      // Retry up to maxRetries times with increasing delay
      if (!rawText && attempt < maxRetries) {
        var delay = attempt * 3000;
        console.log('[anky] retrying in ' + (delay / 1000) + 's (attempt ' + (attempt + 1) + ')');
        setThinkingLabel('reconnecting to anky... (attempt ' + (attempt + 1) + ')');
        setTimeout(function() { streamReflection(ankyId, attempt + 1); }, delay);
        return;
      }
      document.getElementById('thinkingDots').style.display = 'none';
      if (rawText) {
        console.log('[anky] SSE errored but we have partial text (' + rawText.length + ' chars), showing it');
        resultReply.innerHTML = renderMarkdown(rawText);
        resultReply.classList.add('rendered');
        resultActions.style.display = 'flex';
        var link = document.createElement('a');
        link.href = '/anky/' + ankyId;
        link.textContent = 'view anky';
        resultActions.appendChild(link);
      } else {
        console.error('[anky] SSE failed with no data after ' + maxRetries + ' attempts');
        showRetryUI(ankyId, 'anky couldn\'t connect right now. your writing is saved.');
      }
    };
  }

  // Mobile keyboard: resize writing surface to visible viewport
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', function() {
      if (state !== 'sent') {
        document.getElementById('writingSurface').style.height = window.visualViewport.height + 'px';
      }
    });
  }

  try { localStorage.removeItem('anky_last_prompt'); } catch (e) {}

  writingArea.focus();

  return { doSend };
})();
</script>
