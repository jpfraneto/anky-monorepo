<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>anky — log in</title>
  <meta name="theme-color" content="#07070d">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #07070d;
      color: #e0e0e0;
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      max-width: 380px;
      width: 100%;
      padding: 24px;
      text-align: center;
    }
    .login-pfp {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: block;
      opacity: 0.7;
    }
    .login-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .login-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .login-btn {
      display: block;
      width: 100%;
      background: #7b2ff7;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.85; }
    .login-btn:disabled { opacity: 0.4; cursor: default; }
    .login-btn.apple {
      background: #fff;
      color: #000;
    }
    .login-status {
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      margin-top: 16px;
      min-height: 20px;
    }
    .login-back {
      display: inline-block;
      margin-top: 24px;
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
    }
    .login-back:hover { color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
  <div class="login-box">
    <img class="login-pfp" src="/static/icon-192.png" alt="anky">
    <h1 class="login-title">anky</h1>
    <p class="login-sub">log in to save your writing and see anky's interpretation of who you are.</p>
    <button class="login-btn" id="emailBtn">log in with email</button>
    <button class="login-btn apple" id="appleBtn">log in with apple</button>
    <div class="login-status" id="status"></div>
    <a class="login-back" href="/">back to writing</a>
  </div>

  <script>
    var privyAppId = '{{ privy_app_id | default(value="") }}';
    var statusEl = document.getElementById('status');

    function doLogin(method) {
      console.log('[login] starting login with method:', method, 'appId:', privyAppId ? privyAppId.substring(0,8) + '...' : 'MISSING');
      if (!privyAppId) {
        statusEl.textContent = 'login not configured.';
        console.error('[login] no privy app id');
        return;
      }
      statusEl.textContent = 'loading...';
      document.getElementById('emailBtn').disabled = true;
      document.getElementById('appleBtn').disabled = true;

      // Check if Privy SDK already loaded
      if (window.Privy) {
        console.log('[login] Privy SDK already loaded, skipping script inject');
        initAndLogin(method);
        return;
      }

      console.log('[login] loading Privy SDK from cdn.privy.io...');
      var script = document.createElement('script');
      script.src = 'https://cdn.privy.io/js-sdk/v1/privy.min.js';
      script.onload = function() {
        console.log('[login] Privy SDK loaded successfully, window.Privy:', typeof window.Privy);
        initAndLogin(method);
      };
      script.onerror = function(e) {
        console.error('[login] failed to load Privy SDK:', e);
        statusEl.textContent = 'could not load login. try again.';
        enableButtons();
      };
      document.head.appendChild(script);
    }

    function initAndLogin(method) {
      console.log('[login] initAndLogin, window.Privy:', typeof window.Privy);
      if (typeof window.Privy === 'undefined') {
        console.error('[login] window.Privy is undefined after script load');
        statusEl.textContent = 'login SDK not available. try again.';
        enableButtons();
        return;
      }
      try {
        console.log('[login] creating Privy instance...');
        var privy = new window.Privy({
          appId: privyAppId,
          config: {
            loginMethods: [method],
            appearance: { theme: 'dark', accentColor: '#7b2ff7' },
          },
        });
        console.log('[login] Privy instance created, calling login()...');
        statusEl.textContent = '';
        privy.login().then(function(result) {
          console.log('[login] login result:', result ? Object.keys(result) : 'null');
          if (result && result.authToken) {
            statusEl.textContent = 'verifying...';
            console.log('[login] got authToken, verifying with backend...');
            return fetch('/auth/privy/verify', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ auth_token: result.authToken }),
            }).then(function(r) {
              console.log('[login] verify response status:', r.status);
              return r.json();
            }).then(function(data) {
              console.log('[login] verify response:', data);
              if (data.ok) {
                statusEl.textContent = 'welcome back.';
                window.location.href = '/';
              } else {
                statusEl.textContent = 'verification failed: ' + (data.error || 'unknown error');
                enableButtons();
              }
            });
          } else {
            console.log('[login] no authToken in result, user may have closed modal');
            enableButtons();
          }
        }).catch(function(err) {
          console.error('[login] login() rejected:', err);
          statusEl.textContent = '';
          enableButtons();
        });
      } catch(e) {
        console.error('[login] Privy init/login error:', e);
        statusEl.textContent = 'login failed: ' + e.message;
        enableButtons();
      }
    }

    function enableButtons() {
      document.getElementById('emailBtn').disabled = false;
      document.getElementById('appleBtn').disabled = false;
    }

    document.getElementById('emailBtn').addEventListener('click', function() { doLogin('email'); });
    document.getElementById('appleBtn').addEventListener('click', function() { doLogin('apple'); });
  </script>
</body>
</html>
