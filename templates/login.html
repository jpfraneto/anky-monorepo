<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>anky - login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Righteous', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    a { color: #c4a0ff; text-decoration: none; }
    a:hover { color: #e0c8ff; }
    .login-container {
      text-align: center;
      max-width: 400px;
      padding: 40px 24px;
    }
    .login-logo {
      font-size: 32px;
      color: #c4a0ff;
      margin-bottom: 24px;
    }
    .login-status {
      font-size: 14px;
      color: #888;
      margin-bottom: 24px;
      min-height: 20px;
    }
    .login-status.error { color: #e05050; }
    .login-status.success { color: #6ab07a; }
    #privy-mount { min-height: 48px; }
    .login-loading {
      color: #666;
      font-size: 14px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    .login-back {
      margin-top: 32px;
      font-size: 13px;
    }
    .login-btn {
      background: #1a1a2e;
      border: 1px solid #7b2ff7;
      color: #c4a0ff;
      font-family: 'Righteous', sans-serif;
      font-size: 16px;
      padding: 14px 32px;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      margin-bottom: 12px;
    }
    .login-btn:hover { background: #2a2a4e; }
    .login-btn.google { border-color: #4285f4; }
    .login-btn.apple { border-color: #666; }
    .login-divider {
      color: #444;
      font-size: 12px;
      margin: 16px 0;
    }
    .login-disconnect {
      background: transparent;
      border: 1px solid #333;
      color: #666;
      font-family: 'Righteous', sans-serif;
      font-size: 12px;
      padding: 8px 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">anky</div>
    <div class="login-status" id="login-status">loading...</div>
    <div id="privy-mount">
      <div class="login-loading">loading...</div>
    </div>
    <div class="login-back"><a href="/">back to writing</a></div>
  </div>

  <script type="module">
    import React from 'https://esm.sh/react@18.3.1';
    import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';
    import { PrivyProvider, usePrivy, useLoginWithEmail, useLoginWithOAuth } from 'https://esm.sh/@privy-io/react-auth@2.25.0?deps=react@18.3.1,react-dom@18.3.1';

    const h = React.createElement;
    const statusEl = document.getElementById('login-status');

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'login-status' + (type ? ' ' + type : '');
    }

    async function verifyWithBackend(accessToken) {
      setStatus('verifying...', '');
      try {
        const resp = await fetch('/auth/privy/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ auth_token: accessToken }),
        });
        const data = await resp.json();
        if (data.ok) {
          if (data.username) localStorage.setItem('anky_username', data.username);
          if (data.email) localStorage.setItem('anky_email', data.email);
          if (data.wallet_address) localStorage.setItem('wallet_address', data.wallet_address);
          localStorage.setItem('anky_logged_in', 'true');
          setStatus('logged in! redirecting...', 'success');
          setTimeout(() => { window.location.href = '/'; }, 500);
        } else {
          setStatus('verification failed — try again', 'error');
        }
      } catch (e) {
        console.error('Backend verify failed:', e);
        setStatus('server error — try again', 'error');
      }
    }

    function LoginUI() {
      const { login, authenticated, ready, user, getAccessToken, logout } = usePrivy();

      React.useEffect(() => {
        if (!ready) return;

        if (authenticated && user) {
          setStatus('authenticated, verifying...', '');
          getAccessToken().then(token => {
            if (token) {
              verifyWithBackend(token);
            } else {
              setStatus('failed to get access token', 'error');
            }
          }).catch(err => {
            console.error('getAccessToken failed:', err);
            setStatus('token error — try again', 'error');
          });
        } else {
          setStatus('choose how to login', '');
        }
      }, [ready, authenticated, user]);

      if (!ready) {
        return h('div', { className: 'login-loading' }, 'initializing...');
      }

      if (authenticated) {
        return h('div', { style: { display: 'flex', flexDirection: 'column', gap: '12px', alignItems: 'center' } },
          h('div', { style: { color: '#6ab07a', fontSize: '14px' } }, 'connected'),
          h('button', {
            onClick: () => {
              logout();
              localStorage.removeItem('anky_logged_in');
              localStorage.removeItem('anky_username');
              localStorage.removeItem('anky_email');
              localStorage.removeItem('wallet_address');
              setStatus('logged out', '');
            },
            className: 'login-disconnect',
          }, 'disconnect')
        );
      }

      // Use Privy's built-in login modal which handles email, Google, Apple
      return h('div', { style: { display: 'flex', flexDirection: 'column', gap: '0' } },
        h('button', {
          onClick: login,
          className: 'login-btn',
        }, 'login with email or apple')
      );
    }

    function App() {
      return h(PrivyProvider, {
        appId: 'cmivv85zt00ftla0cjpaw155h',
        config: {
          loginMethods: ['email', 'apple'],
          appearance: {
            theme: 'dark',
            accentColor: '#7b2ff7',
            logo: '',
          },
          embeddedWallets: {
            createOnLogin: 'users-without-wallets',
          },
        },
      }, h(LoginUI));
    }

    const mountEl = document.getElementById('privy-mount');
    mountEl.innerHTML = '';
    const root = createRoot(mountEl);
    root.render(h(App));
  </script>
</body>
</html>
